# yaml-language-server: $schema=./config.schema.json
config_version: 2
workspace: ./data
repos:
  root: ./repos
  # Optional: if present, pipeline can clone missing repos. One URL per line.
  clone_urls_file: null
  update_existing: true
  max_workers: 1
  include_git_history_metadata: true
  max_file_mb: 5
  exclude_dirs:
    - .git
    - node_modules
    - vendor
    - dist
    - build
    - target
    - Pods
    - .venv
    - venv
    - __pycache__
    - .dart_tool
    - .gradle
    - .pub-cache
    - DerivedData
    - .terraform
    - .next
    - coverage
  include_extensions:
    - .py
    - .js
    - .jsx
    - .ts
    - .tsx
    - .java
    - .kt
    - .go
    - .rb
    - .php
    - .cs
    - .rs
    - .scala
    - .swift
    - .m
    - .h
    - .cpp
    - .c
    - .sql
    - .yaml
    - .yml
    - .json
    - .toml
    - .xml
    - .gradle
    - .proto
    - .graphql
    - .md
    - .tf
    - .sh
    - .dockerfile
    - Dockerfile

storage:
  duckdb_path: ./data/kb.duckdb
  sqlite_fts_path: ./data/indexes/code_fts.sqlite
  vector_index_path: ./data/indexes/code_vectors.faiss
  vector_meta_path: ./data/indexes/code_vectors_meta.parquet

git_history:
  enabled: true
  # null or omitted means index the full reachable history in the selected scope.
  max_commits_per_repo: null
  metadata_days: null
  rename_detection: true
  patch_hunks: true
  current_blame: true
  use_blame_ignore_revs: true
  write_commit_graph: true
  cochange_window_days: 730
  cochange_min_count: 1
  max_hunk_chars: 20000
  max_blame_files: 500
  max_blame_rows: 50000
  git_timeout_seconds: 300
  max_workers: 1

datadog:
  enabled: true
  site: datadoghq.com
  envs: [prod]
  windows_days: [7, 30, 90]
  service_dependencies: true
  service_definitions: true
  spans:
    enabled: true
    query: "*"
    # Datadog Spans API is rate limited; keep conservative for first run.
    max_pages_per_window: 20
    page_limit: 1000
  logs:
    enabled: true
    query: "*"
    max_pages_per_window: 20
    page_limit: 1000
  # Field aliases are used to normalize logs/spans from different teams.
  field_aliases:
    service: [service, service.name, dd.service, app, application]
    env: [env, environment, dd.env]
    version: [version, dd.version, git.sha, git.commit.sha]
    trace_id: [trace_id, trace.id, dd.trace_id]
    span_id: [span_id, span.id, dd.span_id]
    parent_id: [parent_id, parent.span_id]
    route: [http.route, route, resource_name, resource, path]
    method: [http.method, method]
    status_code: [http.status_code, status_code, status]
    url: [http.url, url, request.url]
    host: [host, http.host, peer.hostname, net.peer.name]
    peer_service: [peer.service, downstream_service, target_service, called_service]
    db_name: [db.name, database, db.instance]
    messaging_destination: [messaging.destination, kafka.topic, topic, queue]
    duration_ms: [duration_ms, duration, elapsed_ms, latency_ms]

bigquery:
  enabled: true
  project_id: null        # defaults to GOOGLE_CLOUD_PROJECT if null
  regions: [region-us]
  windows_days: [30, 180]
  pull_jobs: true
  pull_schemas: true
  pull_lineage: false     # optional, not implemented by default; placeholder
  max_results: null       # optional limit for dry runs

atlassian:
  # Cloud auth: email + API token. Server/Data Center can use bearer_token_env.
  email_env: ATLASSIAN_EMAIL
  api_token_env: ATLASSIAN_API_TOKEN
  bearer_token_env: ATLASSIAN_BEARER_TOKEN
  request_timeout_seconds: 60
  retry_count: 3
  retry_sleep_seconds: 5

confluence:
  enabled: true
  # Example Cloud URL: https://your-company.atlassian.net/wiki
  base_url: ${CONFLUENCE_BASE_URL}
  api_path: /rest/api
  output_dir: ./data/raw/confluence
  clean_output: true
  spaces: []              # empty means all visible spaces
  content_types: [page, blogpost]
  cql: ""                 # appended with AND to generated CQL when present
  page_limit: 100
  max_items: null
  expand:
    - space
    - version
    - history
    - ancestors
    - metadata.labels
    - body.storage
    - body.view
  include_comments: true
  include_attachments: true
  download_attachments: true

jira:
  enabled: true
  # Example Cloud URL: https://your-company.atlassian.net
  base_url: ${JIRA_BASE_URL}
  api_path: /rest/api/3
  output_dir: ./data/raw/jira
  clean_output: true
  jql: "ORDER BY updated DESC"
  page_limit: 100
  max_issues: null
  fields: ["*all"]
  expand:
    - renderedFields
    - names
    - schema
    - operations
    - editmeta
    - changelog
  include_comments: true
  include_changelog: true
  include_worklogs: true
  include_remote_links: true
  include_issue_properties: true
  include_attachments: true
  download_attachments: true
  download_metadata: true

indexing:
  lexical_fts: true
  chunk_write_batch_size: 5000
  # Top-level repository parallelism for code_index. max_workers below is per-repo file parallelism.
  repo_max_workers: 1
  max_workers: 1
  ast_chunking:
    enabled: true
    source: cgc
    fallback_regex: true
    keep_file_windows: true
    include_node_types: [Function, Class, Method, Module, Struct, Enum, Interface]
    max_symbol_lines: 240
    symbol_window_lines: 160
    symbol_window_overlap: 30
    include_context_prefix: true
    dedupe_overlapping_chunks: true
  embeddings:
    enabled: true
    # sentence_transformers | openai | openai_compatible | cli
    provider: sentence_transformers
    model_name: Qwen/Qwen3-Embedding-0.6B
    model_id: null
    # External providers use the same style as agent:
    # base_url: http://localhost:11434/v1
    # api_key_env: OPENAI_API_KEY
    # command: null
    base_url: null
    base_url_env: null
    api_key_env: OPENAI_API_KEY
    command: null
    # auto uses MPS/CUDA when available, otherwise CPU.
    device: auto
    batch_size: 4
    max_workers: 1
    dimensions: null
    normalize_embeddings: true
    request_timeout_seconds: 600
    # null stores per-repo FAISS/parquet shards next to vector_index_path.
    shard_dir: null
    max_chunks: null
    min_text_chars: 80
    max_text_chars: 4096
    include_kinds: [ast_symbol, ast_function, ast_method, ast_class, ast_interface, ast_enum, ast_module, ast_struct, ast_large_symbol_window, doc_section, file_window, symbol]
    exclude_languages: [json]
    rebuild: false
    checkpoint_interval_batches: 10

retrieval:
  fts_top_k: 80
  vector_top_k: 80
  rerank_top_k: 40
  reranker:
    enabled: true
    provider: sentence_transformers
    model_name: Qwen/Qwen3-Reranker-0.6B
    device: cpu
    batch_size: 8

graph_backend:
  enabled: true
  provider: neo4j
  uri: bolt://localhost:7687
  username: neo4j
  password: codegraphcontext
  database: neo4j
  batch_size: 1000
  clear_existing: true

code_graph:
  enabled: true
  command: "$HOME/.local/bin/cgc index {repo_path}"
  query_command: "$HOME/.local/bin/cgc"
  timeout_seconds: 300
  max_workers: 1
  retries: 0
  import:
    enabled: true
    page_size: 5000
    query_timeout_seconds: 300
    node_types: [File, Function, Class, Method, Module, Struct, Enum, Interface]
    max_symbols: null
    max_edges: null
  max_repos: null

agent:
  # Legacy single-agent shape below still works. For multiple agents, set
  # active/fallback and add profiles under agents. Shared fields here are
  # inherited by profiles.
  #
  # active: local
  # fallback: true
  # agents:
  #   - name: local
  #     provider: openai_compatible
  #     model: qwen2.5-coder:32b
  #     base_url: http://localhost:11434/v1
  #     api_key_env: ""
  #   - name: cloud
  #     provider: openai
  #     model: gpt-5.2
  #     api_key_env: OPENAI_API_KEY
  provider: none          # none | cli | openai | openai_compatible | anthropic | anthropic_compatible
  model: null             # example: "gpt-5.2", "claude-sonnet-4-6", "qwen2.5-coder:32b"
  command: null           # used by provider=cli, example: "ollama run qwen2.5-coder:32b"
  api_key_env: null       # defaults: OPENAI_API_KEY or ANTHROPIC_API_KEY; "" disables auth header
  base_url: null          # used by compatible/local gateways, example: "http://localhost:11434/v1"
  base_url_env: null      # defaults: OPENAI_BASE_URL or ANTHROPIC_BASE_URL; "" disables env lookup
  anthropic_version: "2023-06-01"
  temperature: 0
  max_output_tokens: 4096
  request_timeout_seconds: 600
  max_context_chars: 100000
  require_evidence: true
  default_env: prod
  default_window_days: 30
  enrichment:
    enabled: false
    model: null           # optional cheaper/faster model for offline metadata extraction/summaries
